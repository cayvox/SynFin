# THROWAWAY privacy spike (Task 003.5 / RFC-0003). Evidence, NOT production.
# Tests whether executor-coordinated atomic settlement of pre-authorized
# allocations is possible with per-leg authority (no aggregate co-sign), against
# the real CIP-0056 interfaces + Amulet. Does not touch daml/synfin-settlement.
sdk-version: 3.3.0-snapshot.20250507.0
name: synfin-privacy-spike
version: 0.0.1
source: daml
build-options:
  - --target=2.1
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  - ../../daml/dars/splice-api-token-metadata-v1.dar
  - ../../daml/dars/splice-api-token-holding-v1.dar
  - ../../daml/dars/splice-api-token-transfer-instruction-v1.dar
  - ../../daml/dars/splice-api-token-allocation-v1.dar
  - ../../daml/dars/splice-api-token-allocation-request-v1.dar
  - ../../daml/dars/splice-api-token-allocation-instruction-v1.dar
  - ../../daml/dars/splice-api-featured-app-v1.dar
  - ../../daml/dars/splice-util.dar
  - ../../daml/dars/splice-amulet.dar
