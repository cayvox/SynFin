# Synfin on-ledger atomic multi-leg settlement library (ADR-0008).
# Pinned to the nearest publicly-installable Daml snapshot on the Splice
# token-standard's 3.3.0 line (the exact internal pin
# 3.3.0-snapshot.20250502.13767.0.v2fc6c7e2 from canton-3.4 is not published as
# an installable SDK; see daml/dars/README.md). Depends on the REAL CIP-0056
# token-standard interface DARs (built from hyperledger-labs/splice@canton-3.4)
# as data-dependencies — not stubs.
sdk-version: 3.3.0-snapshot.20250507.0
name: synfin-settlement
version: 0.1.0
source: daml
build-options:
  - --target=2.1
dependencies:
  - daml-prim
  - daml-stdlib
data-dependencies:
  - ../dars/splice-api-token-metadata-v1.dar
  - ../dars/splice-api-token-holding-v1.dar
  - ../dars/splice-api-token-allocation-v1.dar
  - ../dars/splice-api-token-allocation-request-v1.dar
