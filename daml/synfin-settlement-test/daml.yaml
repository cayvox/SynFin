# Daml Script test matrix for the Synfin settlement library (TESTING.md §3).
# Proves N-leg atomic DvP against the REAL CIP-0056 interfaces using Amulet as
# the test token. The Splice test harness (Splice.Testing.*) is vendored as
# source under daml/Splice/Testing/ per the standard's own instructions ("Daml
# script code can currently not be shared via .dars across SDKs") — see
# daml/dars/README.md for provenance.
sdk-version: 3.3.0-snapshot.20250507.0
name: synfin-settlement-test
version: 0.1.0
source: daml
build-options:
  - --target=2.1
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  - ../dars/splice-api-token-metadata-v1.dar
  - ../dars/splice-api-token-holding-v1.dar
  - ../dars/splice-api-token-transfer-instruction-v1.dar
  - ../dars/splice-api-token-allocation-v1.dar
  - ../dars/splice-api-token-allocation-request-v1.dar
  - ../dars/splice-api-token-allocation-instruction-v1.dar
  - ../dars/splice-api-featured-app-v1.dar
  - ../dars/splice-util.dar
  - ../dars/splice-amulet.dar
  - ../synfin-settlement/.daml/dist/synfin-settlement-0.1.0.dar
