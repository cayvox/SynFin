name: CI

# Blocking gates per ENGINEERING.md §8. A red gate blocks merge.
# Daml and e2e (Canton testnet) jobs are intentionally stubbed below until the
# settlement library and adapters land (TESTING.md §3, §6).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build · gen-sync · lint · typecheck · test · coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify generated types are in sync
        # Fails if `gen` produces a diff against committed output.
        run: pnpm gen:check

      - name: Lint + format check
        run: |
          pnpm -w lint
          pnpm -w format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + property tests with coverage thresholds
        # Coverage thresholds are enforced inside each package's vitest config
        # (TESTING.md §7). A threshold miss fails this job.
        run: pnpm test

  daml:
    name: daml build + daml test (settlement library) — TESTING.md §3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Daml Script / sandbox need a JVM)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Daml SDK (pinned; ADR-0008)
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.3.0-snapshot.20250507.0
          echo "$HOME/.daml/bin" >> "$GITHUB_PATH"

      - name: Build the settlement library against the real CIP-0056 DARs
        # Vendored DARs in daml/dars/ (provenance: daml/dars/README.md) — no
        # Splice clone needed in CI.
        working-directory: daml/synfin-settlement
        run: daml build

      - name: Build + run the Daml Script test matrix (Amulet)
        working-directory: daml/synfin-settlement-test
        run: |
          daml build
          daml test

