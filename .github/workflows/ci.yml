name: CI

# Blocking gates per ENGINEERING.md §8. A red gate blocks merge.
# Daml and e2e (Canton testnet) jobs are intentionally stubbed below until the
# settlement library and adapters land (TESTING.md §3, §6).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build · gen-sync · lint · typecheck · test · coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build the website (apps/web — astro check + build)
        # The website is already covered by `pnpm build` / `pnpm typecheck` and
        # the root lint/format steps (it is a workspace member). This explicit
        # filtered build surfaces the web app's status as its own CI line
        # (STACK.md "CI checks the web app must pass"). The daml job is untouched.
        run: pnpm --filter @synfin/web build

      - name: Verify generated types are in sync
        # Fails if `gen` produces a diff against committed output.
        run: pnpm gen:check

      - name: Lint + format check
        run: |
          pnpm -w lint
          pnpm -w format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + property tests with coverage thresholds
        # Coverage thresholds are enforced inside each package's vitest config
        # (TESTING.md §7). A threshold miss fails this job.
        run: pnpm test

  release-verify:
    name: release-verify · publint · attw · pack · tarball assertions
    # Static publish readiness for the public @synfin packages (RELEASING.md).
    # No registry and no publish: it builds, then runs publint + attw + pnpm pack
    # and asserts each tarball ships only build output, README, and LICENSE. The
    # deeper Verdaccio publish + clean-room install + smoke flow is local
    # (pnpm release:verify:verdaccio), documented in RELEASING.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Static publish checks (no registry, no publish)
        run: pnpm release:verify

  daml:
    name: daml build + daml test (settlement library) — TESTING.md §3
    runs-on: ubuntu-latest
    env:
      TERM: dumb # silence harmless `tput: No value for $TERM` from the installer
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Daml Script / sandbox need a JVM)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Daml SDK 3.3.0-snapshot.20250507.0 (deterministic; no get.daml.com)
        # get.daml.com's installer cannot resolve this snapshot in CI's headless
        # shell (empty download URL -> "FAILED TO INSTALL"). Instead we install
        # directly from the pinned GitHub release tarball: its bundled install.sh
        # installs from the extracted dir (no network version resolution) under
        # the version in daml_version.txt (= 3.3.0-snapshot.20250507.0), matching
        # the daml.yaml pin. Source URL recorded in daml/dars/README.md.
        run: |
          set -euo pipefail
          URL="https://github.com/digital-asset/daml/releases/download/v3.3.0-snapshot.20250507.0/daml-sdk-3.3.0-snapshot.20250502.13767.0.v2fc6c7e2-linux-x86_64.tar.gz"
          curl -fL --retry 3 --retry-delay 5 "$URL" -o /tmp/daml-sdk.tar.gz
          tar xzf /tmp/daml-sdk.tar.gz -C /tmp
          /tmp/sdk-*/install.sh
          echo "$HOME/.daml/bin" >> "$GITHUB_PATH"

      - name: Show Daml version
        run: daml version

      - name: Build the settlement library against the real CIP-0056 DARs
        # Vendored DARs in daml/dars/ (provenance: daml/dars/README.md) — no
        # Splice clone needed in CI.
        working-directory: daml/synfin-settlement
        run: daml build

      - name: Build + run the Daml Script test matrix (Amulet)
        working-directory: daml/synfin-settlement-test
        run: |
          daml build
          daml test

